name: flutter_attendance
description: CDGI Faculty Attendance System - Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & networking
  http: ^1.2.1
  dio: ^5.4.3+1

  # State management
  provider: ^6.1.2

  # Local storage / token
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3

  # Camera & image
  camera: ^0.10.5+9
  image: ^4.1.7
  image_picker: ^1.1.2

  # Location / GPS
  geolocator: ^12.0.0
  permission_handler: ^11.3.1

  # Face detection (ML Kit)
  google_mlkit_face_detection: ^0.11.0

  # UI helpers
  intl: ^0.19.0
  fl_chart: ^0.68.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  table_calendar: ^3.1.2
  flutter_svg: ^2.0.10+1
  gap: ^3.0.1
  fluttertoast: ^8.2.8

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
